{{- if and .Values.postgres.enabled (not .Values.postgres.auth.existingSecret) }}
{{- if not .Values.postgres.auth.password }}
{{- fail "postgres.auth.password or postgres.auth.existingSecret must be set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "day2.postgres.fullname" . }}
  labels:
    {{- include "day2.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
type: Opaque
data:
  {{ .Values.postgres.auth.secretPasswordKey }}: {{ .Values.postgres.auth.password | b64enc | quote }}
{{- end }}
