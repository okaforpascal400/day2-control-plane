apiVersion: v1
kind: Service
metadata:
  name: {{ include "day2.fullname" . }}-web
  labels:
    {{- include "day2.componentLabels" (dict "ctx" . "component" "web") | nindent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "day2.selectorLabels" (dict "ctx" . "component" "web") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "day2.fullname" . }}-web
  labels:
    {{- include "day2.componentLabels" (dict "ctx" . "component" "web") | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "day2.selectorLabels" (dict "ctx" . "component" "web") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "day2.componentLabels" (dict "ctx" . "component" "web") | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
        # The unprivileged nginx image's built-in user.
        runAsUser: 101
        runAsGroup: 101
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "day2.image" (dict "ctx" . "svc" .Values.web) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          env:
            # nginx proxies /api here, so the dashboard is same-origin and the
            # image carries no environment-specific configuration.
            - name: API_UPSTREAM
              value: http://{{ include "day2.fullname" . }}-api:{{ .Values.api.service.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          volumeMounts:
            # readOnlyRootFilesystem is on; nginx writes its rendered config,
            # pid file, and caches to these.
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
            - name: conf
              mountPath: /etc/nginx/conf.d
            # nginx creates its proxy_temp/client_temp dirs here at start.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: conf
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
