apiVersion: v1
kind: Service
metadata:
  name: {{ include "day2.fullname" . }}-api
  labels:
    {{- include "day2.componentLabels" (dict "ctx" . "component" "api") | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "day2.selectorLabels" (dict "ctx" . "component" "api") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "day2.fullname" . }}-api
  labels:
    {{- include "day2.componentLabels" (dict "ctx" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "day2.selectorLabels" (dict "ctx" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "day2.componentLabels" (dict "ctx" . "component" "api") | nindent 8 }}
      annotations:
        # Roll the pods when the credential changes.
        checksum/secret: {{ include (print $.Template.BasePath "/postgres-secret.yaml") . | sha256sum }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
        runAsUser: 10001
        runAsGroup: 10001
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "day2.image" (dict "ctx" . "svc" .Values.api) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
          env:
            {{- include "day2.postgresPasswordEnv" . | nindent 12 }}
            - name: DAY2_DATABASE_URL
              value: {{ include "day2.databaseUrlTemplate" . | quote }}
            - name: DAY2_LOG_LEVEL
              value: {{ .Values.api.env.logLevel | quote }}
            - name: DAY2_CREATE_SCHEMA_ON_START
              value: {{ .Values.api.env.createSchemaOnStart | quote }}
            - name: DAY2_SERVICE_NAME
              value: api
          # Liveness deliberately hits /health, which never touches Postgres: a
          # database outage must not restart every api pod on top of it.
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          # Readiness hits /ready, which does check Postgres, so a pod that cannot
          # serve is pulled from the Service instead of being killed.
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 3
            failureThreshold: 30
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
