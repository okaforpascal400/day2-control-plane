[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
addopts = -q
# Resolved against rootdir. Bare `pytest` does not put the CWD on sys.path the
# way `python -m pytest` does, so state the import roots here and both
# invocations behave identically. `../shared` mirrors the images' PYTHONPATH.
pythonpath = . ../shared
