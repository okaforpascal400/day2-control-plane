# Shared lint/format config for every Python surface in the repo.
target-version = "py312"
line-length = 90

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # import sorting
    "B",   # bugbear
    "UP",  # pyupgrade
    "C4",  # comprehensions
    "SIM", # simplify
    "RUF",
]

[lint.flake8-bugbear]
# FastAPI's parameter declarations are calls in argument defaults by design;
# B008 exists for mutable defaults, which these are not.
extend-immutable-calls = [
    "fastapi.Body",
    "fastapi.Depends",
    "fastapi.Header",
    "fastapi.Path",
    "fastapi.Query",
]

[lint.isort]
known-first-party = ["api", "worker", "day2_shared"]
